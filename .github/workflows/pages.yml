name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4    # ← все още няма v5, но ще бъде обновена
      - uses: actions/setup-node@v4  # ← все още няма v5
        with:
          node-version: '24'         # ← задайте изрично Node.js 24
      - name: Generate HTML pages
        run: node generate.js
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4  # ← все още няма v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4   # ← все още няма v5
