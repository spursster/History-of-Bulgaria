<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8a5a2b"/>
      <stop offset="100%" stop-color="#f0d08a"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="6" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background textured panel -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <g opacity="0.08">
    <rect width="1200" height="400" fill="url(#bgGrad)"/>
  </g>

  <!-- Shield -->
  <g transform="translate(140,40) scale(1)">
    <path d="M220 20 L340 20 L380 80 L380 200 C380 260 300 340 220 380 C140 340 60 260 60 200 L60 80 Z" fill="url(#shieldGlow)" stroke="#6b3f1f" stroke-width="6" filter="url(#softShadow)"/>

    <!-- Lion silhouette (stylized, original) -->
    <path d="M130 120 C140 100 170 88 200 90 C225 92 250 104 270 122 C290 140 300 160 310 185 C320 210 300 220 280 220 C260 220 250 210 235 210 C220 210 210 220 195 228 C180 236 160 245 140 242 C130 240 120 230 120 220 C120 210 125 160 130 120 Z" fill="#5a2f0b"/>
    <!-- Tail -->
    <path d="M300 160 C320 150 360 140 390 130" stroke="#5a2f0b" stroke-width="10" stroke-linecap="round" fill="none" />
    <!-- Crest ornament -->
    <circle cx="220" cy="60" r="10" fill="#b8862a" stroke="#6b3f1f" stroke-width="2"/>
  </g>

  <!-- Title text subtle -->
  <text x="520" y="320" font-family="Segoe UI, Tahoma, Geneva, Verdana, sans-serif" font-size="36" fill="#3e2210" opacity="0.85">Първа Българска държава</text>

</svg>
